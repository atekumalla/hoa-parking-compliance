<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0e1117; font-family: -apple-system, sans-serif; color: #fafafa; }
        .camera-container { width: 100%; text-align: center; }
        #liveCanvas {
            width: 100%;
            display: block;
            border-radius: 8px;
            background: #000;
        }
        video { display: none; }
        .controls {
            display: flex; gap: 10px; padding: 12px 0;
            justify-content: center; align-items: center;
        }
        button {
            padding: 12px 20px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        .capture-btn { background: #ff4b4b; color: #fff; padding: 14px 28px; font-size: 17px; }
        .flip-btn { background: #333; color: #fff; }
        .retake-btn { background: #333; color: #fff; }
        .use-btn { background: #21c354; color: #fff; padding: 14px 28px; font-size: 17px; }
        .status { text-align: center; color: #888; font-size: 13px; padding: 4px 0; }
        .hidden { display: none !important; }
        .preview-container { width: 100%; }
        .preview-container img {
            width: 100%; border-radius: 8px; display: block;
        }
    </style>
</head>
<body>
    <!-- Live Camera View -->
    <div id="liveView" class="camera-container">
        <canvas id="liveCanvas"></canvas>
        <video id="video" autoplay playsinline muted></video>
        <div class="controls">
            <button class="flip-btn" id="flipBtn">🔄 Flip</button>
            <button class="capture-btn" id="captureBtn">📷 Capture</button>
        </div>
        <div class="status" id="status">Starting rear camera...</div>
    </div>

    <!-- Photo Preview (after capture) -->
    <div id="previewView" class="hidden preview-container">
        <img id="previewImg" src="">
        <div class="controls">
            <button class="retake-btn" id="retakeBtn">🔄 Retake</button>
            <button class="use-btn" id="useBtn">✅ Use Photo</button>
        </div>
    </div>

    <canvas id="captureCanvas" style="display:none"></canvas>

    <script>
    (function() {
        // --- Streamlit Component Communication ---
        function sendMsg(type, data) {
            window.parent.postMessage(
                Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
            );
        }
        function setReady() { sendMsg("streamlit:componentReady", { apiVersion: 1 }); }
        function setHeight(h) { sendMsg("streamlit:setFrameHeight", { height: h }); }
        function setValue(v) { sendMsg("streamlit:setComponentValue", { value: v }); }

        // --- State ---
        var stream = null;
        var facingMode = 'environment';
        var animFrame = null;
        var video = document.getElementById('video');
        var liveCanvas = document.getElementById('liveCanvas');
        var captureCanvas = document.getElementById('captureCanvas');
        var status = document.getElementById('status');
        var liveView = document.getElementById('liveView');
        var previewView = document.getElementById('previewView');
        var previewImg = document.getElementById('previewImg');

        // --- Camera ---
        function startCamera() {
            if (stream) {
                stream.getTracks().forEach(function(t) { t.stop(); });
            }
            navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { ideal: facingMode },
                    width: { ideal: 1920 },
                    height: { ideal: 1440 }
                },
                audio: false
            }).then(function(s) {
                stream = s;
                video.srcObject = s;
                video.play();
                status.textContent = facingMode === 'environment'
                    ? '📷 Rear camera active'
                    : '🤳 Front camera active';
                startPreviewLoop();
            }).catch(function(err) {
                // Fallback without facingMode
                navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1440 } },
                    audio: false
                }).then(function(s) {
                    stream = s;
                    video.srcObject = s;
                    video.play();
                    status.textContent = '📷 Camera active';
                    startPreviewLoop();
                }).catch(function(err2) {
                    status.textContent = '❌ Cannot access camera: ' + err2.message;
                });
            });
        }

        // --- Live Preview Loop (draws rotated frames onto visible canvas) ---
        function startPreviewLoop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            drawPreview();
        }

        function drawPreview() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;

            if (!vw || !vh) {
                animFrame = requestAnimationFrame(drawPreview);
                return;
            }

            var ctx = liveCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                // Canvas in portrait orientation (swap dimensions)
                if (liveCanvas.width !== vh || liveCanvas.height !== vw) {
                    liveCanvas.width = vh;
                    liveCanvas.height = vw;
                    updateHeight();
                }
                ctx.save();
                ctx.translate(vh / 2, vw / 2);
                if (facingMode === 'environment') {
                    ctx.rotate(-Math.PI / 2); // 90 CCW for rear camera
                } else {
                    ctx.rotate(Math.PI / 2);  // 90 CW for front camera
                }
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
                ctx.restore();
            } else {
                // No rotation needed — stream is already correct
                if (liveCanvas.width !== vw || liveCanvas.height !== vh) {
                    liveCanvas.width = vw;
                    liveCanvas.height = vh;
                    updateHeight();
                }
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            animFrame = requestAnimationFrame(drawPreview);
        }

        // --- Capture full-resolution photo (same rotation logic) ---
        function capturePhoto() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;
            if (!vw || !vh) return null;

            var ctx = captureCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                captureCanvas.width = vh;
                captureCanvas.height = vw;
                ctx.translate(vh / 2, vw / 2);
                if (facingMode === 'environment') {
                    ctx.rotate(-Math.PI / 2);
                } else {
                    ctx.rotate(Math.PI / 2);
                }
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
            } else {
                captureCanvas.width = vw;
                captureCanvas.height = vh;
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            return captureCanvas.toDataURL('image/jpeg', 0.92);
        }

        // --- UI Handlers ---
        document.getElementById('flipBtn').addEventListener('click', function() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        });

        document.getElementById('captureBtn').addEventListener('click', function() {
            var dataUrl = capturePhoto();
            if (dataUrl) {
                previewImg.src = dataUrl;
                liveView.classList.add('hidden');
                previewView.classList.remove('hidden');
                if (animFrame) cancelAnimationFrame(animFrame);
                updateHeight();
            }
        });

        document.getElementById('retakeBtn').addEventListener('click', function() {
            previewView.classList.add('hidden');
            liveView.classList.remove('hidden');
            startPreviewLoop();
            updateHeight();
        });

        document.getElementById('useBtn').addEventListener('click', function() {
            var dataUrl = previewImg.src;
            setValue(dataUrl);
            status.textContent = '✅ Photo sent!';
            previewView.classList.add('hidden');
            liveView.classList.remove('hidden');
            startPreviewLoop();
            updateHeight();
        });

        // --- Height management ---
        function updateHeight() {
            setTimeout(function() {
                setHeight(document.body.scrollHeight + 20);
            }, 150);
        }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === "streamlit:render") {
                updateHeight();
            }
        });

        window.addEventListener('resize', function() {
            updateHeight();
        });

        // --- Init ---
        setReady();
        startCamera();
        setTimeout(updateHeight, 500);
    })();
    </script>
</body>
</html>
