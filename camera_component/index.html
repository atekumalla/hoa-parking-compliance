<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0e1117; font-family: -apple-system, sans-serif; color: #fafafa; }
        .camera-container { width: 100%; text-align: center; }
        #liveCanvas {
            width: 100%;
            display: block;
            border-radius: 8px;
            background: #000;
        }
        video { display: none; }
        .controls {
            display: flex; gap: 10px; padding: 12px 0;
            justify-content: center; align-items: center;
        }
        button {
            padding: 12px 20px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        .capture-btn { background: #ff4b4b; color: #fff; padding: 14px 28px; font-size: 17px; }
        .flip-btn { background: #333; color: #fff; }
        .status { text-align: center; color: #888; font-size: 13px; padding: 4px 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Live Camera View -->
    <div id="liveView" class="camera-container">
        <canvas id="liveCanvas"></canvas>
        <video id="video" autoplay playsinline muted></video>
        <div class="controls">
            <button class="flip-btn" id="flipBtn">🔄 Flip</button>
            <button class="capture-btn" id="captureBtn">📷 Capture</button>
        </div>
        <div class="status" id="status">Starting rear camera...</div>
    </div>

    <canvas id="captureCanvas" style="display:none"></canvas>

    <script>
    (function() {
        // --- Streamlit Component Communication ---
        function sendMsg(type, data) {
            window.parent.postMessage(
                Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
            );
        }
        function setReady() { sendMsg("streamlit:componentReady", { apiVersion: 1 }); }
        function setHeight(h) { sendMsg("streamlit:setFrameHeight", { height: h }); }
        function setValue(v) { sendMsg("streamlit:setComponentValue", { value: v, dataType: "json" }); }

        // --- State ---
        var stream = null;
        var facingMode = 'environment';
        var animFrame = null;
        var captured = false;
        var video = document.getElementById('video');
        var liveCanvas = document.getElementById('liveCanvas');
        var captureCanvas = document.getElementById('captureCanvas');
        var captureBtn = document.getElementById('captureBtn');
        var flipBtn = document.getElementById('flipBtn');
        var status = document.getElementById('status');

        // --- Camera ---
        function startCamera() {
            stopCamera();
            // Use 'exact' to force the specific camera (not just a preference)
            navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: facingMode },
                    width: { ideal: 4032 },
                    height: { ideal: 3024 }
                },
                audio: false
            }).then(onCameraReady).catch(function() {
                // Fallback: 'exact' failed, try 'ideal'
                navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: facingMode },
                        width: { ideal: 4032 },
                        height: { ideal: 3024 }
                    },
                    audio: false
                }).then(onCameraReady).catch(function() {
                    // Last resort: any camera
                    navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 4032 }, height: { ideal: 3024 } },
                        audio: false
                    }).then(onCameraReady).catch(function(err) {
                        status.textContent = '❌ Cannot access camera: ' + err.message;
                    });
                });
            });
        }

        function onCameraReady(s) {
            stream = s;
            video.srcObject = s;
            video.play();
            captured = false;
            captureBtn.textContent = '📷 Capture';
            captureBtn.className = 'capture-btn';
            flipBtn.classList.remove('hidden');
            status.textContent = facingMode === 'environment'
                ? '📷 Rear camera active'
                : '🤳 Front camera active';
            startPreviewLoop();
        }

        function stopCamera() {
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
            if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
        }

        // --- Live Preview Loop (draws rotated frames onto visible canvas) ---
        function startPreviewLoop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            drawPreview();
        }

        function drawPreview() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;

            if (!vw || !vh) {
                animFrame = requestAnimationFrame(drawPreview);
                return;
            }

            var ctx = liveCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                if (liveCanvas.width !== vh || liveCanvas.height !== vw) {
                    liveCanvas.width = vh;
                    liveCanvas.height = vw;
                    updateHeight();
                }
                ctx.save();
                ctx.translate(vh / 2, vw / 2);
                ctx.rotate(-Math.PI / 2); // 90° CCW — same for both cameras
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
                ctx.restore();
            } else {
                if (liveCanvas.width !== vw || liveCanvas.height !== vh) {
                    liveCanvas.width = vw;
                    liveCanvas.height = vh;
                    updateHeight();
                }
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            animFrame = requestAnimationFrame(drawPreview);
        }

        // --- Capture full-resolution photo (same rotation logic) ---
        function capturePhoto() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;
            if (!vw || !vh) return null;

            var ctx = captureCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                captureCanvas.width = vh;
                captureCanvas.height = vw;
                ctx.translate(vh / 2, vw / 2);
                ctx.rotate(-Math.PI / 2); // 90° CCW — same for both cameras
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
            } else {
                captureCanvas.width = vw;
                captureCanvas.height = vh;
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            return captureCanvas.toDataURL('image/jpeg', 0.92);
        }

        // --- UI Handlers ---
        flipBtn.addEventListener('click', function() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        });

        captureBtn.addEventListener('click', function() {
            if (captured) {
                // Retake: restart camera
                startCamera();
                return;
            }
            var dataUrl = capturePhoto();
            if (dataUrl) {
                // Send photo, stop camera to save power
                setValue(dataUrl);
                stopCamera();
                captured = true;
                captureBtn.textContent = '🔄 Retake';
                captureBtn.className = 'capture-btn';
                captureBtn.style.background = '#333';
                flipBtn.classList.add('hidden');
                status.textContent = '✅ Photo captured! Scroll down to see preview.';
            }
        });

        // --- Height management ---
        function updateHeight() {
            setTimeout(function() {
                setHeight(document.body.scrollHeight + 20);
            }, 150);
        }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === "streamlit:render") {
                updateHeight();
            }
        });

        window.addEventListener('resize', function() {
            updateHeight();
        });

        // --- Init ---
        setReady();
        startCamera();
        setTimeout(updateHeight, 500);
    })();
    </script>
</body>
</html>
