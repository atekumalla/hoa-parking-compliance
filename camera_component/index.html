<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0e1117; font-family: -apple-system, sans-serif; color: #fafafa; }
        .camera-container { width: 100%; text-align: center; }
        #liveCanvas {
            width: 100%;
            display: block;
            border-radius: 8px;
            background: #000;
        }
        video { display: none; }
        .controls {
            display: flex; gap: 10px; padding: 12px 0;
            justify-content: center; align-items: center;
        }
        button {
            padding: 12px 20px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.7; }
        .capture-btn { background: #ff4b4b; color: #fff; padding: 14px 28px; font-size: 17px; }
        .flip-btn { background: #333; color: #fff; }
        .status { text-align: center; color: #888; font-size: 13px; padding: 4px 0; }
        .hidden { display: none !important; }
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid #444;
            border-top-color: #ff4b4b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status.loading { color: #ccc; font-size: 14px; padding: 10px 0; }
        /* Resolution toggle */
        .res-toggle {
            display: flex; gap: 4px; padding: 8px 0 4px;
            justify-content: center; align-items: center;
        }
        .res-toggle-label {
            font-size: 12px; color: #888; margin-right: 6px;
        }
        .res-btn {
            padding: 6px 14px; border: 1px solid #444; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            background: #1a1a2e; color: #aaa; transition: all 0.15s;
        }
        .res-btn.active {
            background: #ff4b4b; color: #fff; border-color: #ff4b4b;
        }
    </style>
</head>
<body>
    <!-- Live Camera View -->
    <div id="liveView" class="camera-container">
        <canvas id="liveCanvas"></canvas>
        <video id="video" autoplay playsinline muted></video>
        <div class="controls">
            <button class="flip-btn" id="flipBtn">🔄 Flip</button>
            <button class="capture-btn" id="captureBtn">📷 Capture</button>
        </div>
        <div class="res-toggle" id="resToggles">
            <span class="res-toggle-label">Quality:</span>
            <button class="res-btn" data-level="min">Min</button>
            <button class="res-btn active" data-level="mid">Mid</button>
            <button class="res-btn" data-level="max">Max</button>
        </div>
        <div class="status" id="status">Starting rear camera...</div>
    </div>

    <canvas id="captureCanvas" style="display:none"></canvas>

    <script>
    (function() {
        // --- Streamlit Component Communication ---
        function sendMsg(type, data) {
            window.parent.postMessage(
                Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
            );
        }
        function setReady() { sendMsg("streamlit:componentReady", { apiVersion: 1 }); }
        function setHeight(h) { sendMsg("streamlit:setFrameHeight", { height: h }); }
        function setValue(v) { sendMsg("streamlit:setComponentValue", { value: v, dataType: "json" }); }

        // --- State ---
        var stream = null;
        var facingMode = 'environment';
        var animFrame = null;
        var captured = false;
        var scrollPending = false; // scroll after first video frame renders
        var video = document.getElementById('video');
        var liveCanvas = document.getElementById('liveCanvas');
        var captureCanvas = document.getElementById('captureCanvas');
        var captureBtn = document.getElementById('captureBtn');
        var flipBtn = document.getElementById('flipBtn');
        var status = document.getElementById('status');

        // --- Resolution presets ---
        // Min: 1920×1440 (2.8MP) — fastest capture & upload
        // Mid: 3024×2268 (6.9MP) — balanced quality/speed
        // Max: 4032×3024 (12MP) — full sensor, slowest
        var resPresets = {
            min: { w: 1920, h: 1440, quality: 0.80, label: '2.8MP' },
            mid: { w: 3024, h: 2268, quality: 0.85, label: '6.9MP' },
            max: { w: 4032, h: 3024, quality: 0.92, label: '12MP' }
        };
        var currentRes = 'mid'; // default

        // --- Camera ---
        function getResPreset() { return resPresets[currentRes]; }

        function startCamera() {
            stopCamera();
            var preset = getResPreset();
            // Use 'exact' to force the specific camera (not just a preference)
            navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: facingMode },
                    width: { ideal: preset.w },
                    height: { ideal: preset.h }
                },
                audio: false
            }).then(onCameraReady).catch(function() {
                // Fallback: 'exact' failed, try 'ideal'
                navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: facingMode },
                        width: { ideal: preset.w },
                        height: { ideal: preset.h }
                    },
                    audio: false
                }).then(onCameraReady).catch(function() {
                    // Last resort: any camera
                    navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: preset.w }, height: { ideal: preset.h } },
                        audio: false
                    }).then(onCameraReady).catch(function(err) {
                        status.textContent = '❌ Cannot access camera: ' + err.message;
                    });
                });
            });
        }

        function onCameraReady(s) {
            stream = s;
            video.srcObject = s;
            video.play();
            captured = false;
            captureBtn.textContent = '📷 Capture';
            captureBtn.className = 'capture-btn';
            flipBtn.classList.remove('hidden');
            var camLabel = facingMode === 'environment' ? '📷 Rear' : '🤳 Front';
            var preset = getResPreset();
            status.textContent = camLabel + ' camera active · ' + preset.label;
            status.className = 'status';
            startPreviewLoop();
            // Defer scroll until the first video frame renders (sets canvas height)
            scrollPending = true;
        }

        function scrollIntoFullView() {
            try {
                // Scroll the capture button to the bottom of the parent viewport
                // so both the camera preview and controls are visible
                if (window.frameElement) {
                    var frame = window.frameElement;
                    var frameRect = frame.getBoundingClientRect();
                    var parentViewH = window.parent.innerHeight;
                    // We want captureBtn visible near the bottom of the viewport.
                    // captureBtn is at a known offset inside the iframe.
                    var btnOffset = captureBtn.offsetTop + captureBtn.offsetHeight + 30;
                    // How far the parent needs to scroll so btnOffset aligns near viewport bottom
                    var targetScrollTop = frame.offsetTop + btnOffset - parentViewH;
                    var currentScroll = window.parent.scrollY || window.parent.pageYOffset;
                    if (targetScrollTop > currentScroll) {
                        window.parent.scrollTo({ top: targetScrollTop, behavior: 'smooth' });
                    }
                }
            } catch(e) {
                // Cross-origin fallback
                captureBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function stopCamera() {
            if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
            if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
        }

        // --- Live Preview Loop (draws rotated frames onto visible canvas) ---
        function startPreviewLoop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            drawPreview();
        }

        function drawPreview() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;

            if (!vw || !vh) {
                animFrame = requestAnimationFrame(drawPreview);
                return;
            }

            var ctx = liveCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                if (liveCanvas.width !== vh || liveCanvas.height !== vw) {
                    liveCanvas.width = vh;
                    liveCanvas.height = vw;
                    updateHeight();
                }
                ctx.save();
                ctx.translate(vh / 2, vw / 2);
                ctx.rotate(-Math.PI / 2); // 90° CCW — same for both cameras
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
                ctx.restore();
            } else {
                if (liveCanvas.width !== vw || liveCanvas.height !== vh) {
                    liveCanvas.width = vw;
                    liveCanvas.height = vh;
                    updateHeight();
                }
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            // Scroll after the first frame renders so canvas has its final size
            if (scrollPending) {
                scrollPending = false;
                setTimeout(scrollIntoFullView, 200);
            }

            animFrame = requestAnimationFrame(drawPreview);
        }

        // --- Capture full-resolution photo (same rotation logic) ---
        function capturePhoto() {
            var vw = video.videoWidth;
            var vh = video.videoHeight;
            if (!vw || !vh) return null;

            var ctx = captureCanvas.getContext('2d');
            var isStreamLandscape = vw > vh;
            var isDevicePortrait = window.innerHeight > window.innerWidth;
            var needsRotation = isStreamLandscape && isDevicePortrait;

            if (needsRotation) {
                captureCanvas.width = vh;
                captureCanvas.height = vw;
                ctx.translate(vh / 2, vw / 2);
                ctx.rotate(-Math.PI / 2); // 90° CCW — same for both cameras
                ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
            } else {
                captureCanvas.width = vw;
                captureCanvas.height = vh;
                ctx.drawImage(video, 0, 0, vw, vh);
            }

            return captureCanvas.toDataURL('image/jpeg', getResPreset().quality);
        }

        // --- UI Handlers ---
        flipBtn.addEventListener('click', function() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            startCamera();
        });

        // Resolution toggle buttons
        var resButtons = document.querySelectorAll('.res-btn');
        resButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                var level = btn.getAttribute('data-level');
                if (level === currentRes) return;
                currentRes = level;
                resButtons.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                // Restart camera with new resolution (only if not already captured)
                if (!captured) {
                    startCamera();
                }
            });
        });

        captureBtn.addEventListener('click', function() {
            if (captured) {
                // Retake: restart camera
                startCamera();
                return;
            }

            // Show loading state immediately
            captureBtn.disabled = true;
            captureBtn.textContent = '⏳ Processing...';
            captureBtn.style.opacity = '0.6';
            flipBtn.classList.add('hidden');
            status.innerHTML = '<span class="spinner"></span> Encoding photo...';
            status.className = 'status loading';

            // Use setTimeout to allow the DOM to repaint before the heavy toDataURL call
            setTimeout(function() {
                var dataUrl = capturePhoto();
                if (dataUrl) {
                    status.innerHTML = '<span class="spinner"></span> Uploading to server...';
                    // Send photo, stop camera to save power
                    setValue(dataUrl);
                    stopCamera();
                    captured = true;
                    captureBtn.textContent = '🔄 Retake';
                    captureBtn.className = 'capture-btn';
                    captureBtn.style.background = '#333';
                    captureBtn.style.opacity = '1';
                    captureBtn.disabled = false;
                    status.innerHTML = '<span class="spinner"></span> Uploading — preview will appear below...';
                } else {
                    // Failed — restore UI
                    captureBtn.textContent = '📷 Capture';
                    captureBtn.style.opacity = '1';
                    captureBtn.disabled = false;
                    flipBtn.classList.remove('hidden');
                    status.textContent = '❌ Capture failed — try again';
                    status.className = 'status';
                }
            }, 50);
        });

        // --- Height management ---
        function updateHeight() {
            setTimeout(function() {
                setHeight(document.body.scrollHeight + 20);
            }, 150);
        }

        window.addEventListener("message", function(event) {
            if (event.data && event.data.type === "streamlit:render") {
                updateHeight();
                // Streamlit re-rendered — if we were showing the upload spinner, clear it
                if (captured) {
                    status.textContent = '✅ Photo sent — see preview below.';
                    status.className = 'status';
                }
            }
        });

        window.addEventListener('resize', function() {
            updateHeight();
        });

        // --- Init ---
        setReady();
        startCamera();
        setTimeout(updateHeight, 500);
    })();
    </script>
</body>
</html>
